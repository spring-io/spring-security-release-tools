name: Test
permissions: {}
on:
  workflow_call:
    inputs:
      java-version:
        description: Version of the JDK to use to run the Gradle command.
        required: false
        default: '17'
        type: string
      distribution:
        description: Distribution of the JDK to use to run the Gradle command.
        required: false
        default: 'temurin'
        type: string
      test-args:
        description: Arguments for the gradle test command.
        required: false
        default: ''
        type: string
    secrets:
      DEVELOCITY_ACCESS_KEY:
        required: false

env:
  DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Publish to Local Repository
        uses: spring-io/spring-security-actions/run-gradle@main
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.distribution }}
          artifactory-url: ${{ env.ARTIFACTORY_URL }}
          username: ${{ secrets.COMMERCIAL_ARTIFACTORY_USERNAME || secrets.ARTIFACTORY_USERNAME }}
          password: ${{ secrets.COMMERCIAL_ARTIFACTORY_PASSWORD || secrets.ARTIFACTORY_PASSWORD }}
          gradle-args: test ${{ inputs.test-args }}
